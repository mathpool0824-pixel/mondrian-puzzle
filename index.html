<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>몬드리안 블록 퍼즐</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #e2e8f0; touch-action: none; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
        canvas { display: block; background-color: #f8fafc; }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background-color: #4b5563; color: white; border-color: #4b5563; }
        /* 디바이스 시뮬레이터 래퍼 부드러운 전환 */
        #app-wrapper { transition: max-width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-300 h-[100dvh] flex flex-col items-center justify-center overflow-hidden">

    <!-- 앱 컨테이너 (디바이스별 해상도 시뮬레이션) -->
    <div id="app-wrapper" class="w-full h-full flex flex-col bg-white shadow-2xl transition-all duration-300 mx-auto relative" style="max-width: 100%;">

        <!-- 상단 헤더 및 기기 선택 (글씨 왼쪽으로 이동) -->
        <header class="bg-white pt-3 pb-2 px-3 shadow-sm border-b border-gray-200 z-10 flex-shrink-0 relative">
            <div class="flex items-center justify-between w-full mx-auto pb-2">
                
                <!-- 최적화 버튼 (글씨 왼쪽) -->
                <div class="flex items-center space-x-1 bg-gray-100 p-1 rounded-lg shadow-inner">
                    <button class="device-btn bg-blue-500 text-white px-2 py-1 rounded shadow text-xs font-bold transition" data-device="pc">💻 PC</button>
                    <button class="device-btn text-gray-600 hover:bg-gray-200 px-2 py-1 rounded text-xs font-bold transition" data-device="tab">📱 탭</button>
                    <button class="device-btn text-gray-600 hover:bg-gray-200 px-2 py-1 rounded text-xs font-bold transition" data-device="mobile">📱 폰</button>
                </div>
                
                <!-- 제목 -->
                <h1 class="text-lg md:text-2xl font-extrabold text-gray-800 text-center flex-grow">몬드리안 블록 퍼즐</h1>
                
                <!-- 이미지 저장 -->
                <button id="btn-export" class="px-3 py-1.5 rounded-lg bg-gray-800 text-white font-semibold text-xs md:text-sm hover:bg-gray-700 shadow transition flex items-center">
                    📸 저장
                </button>
            </div>

            <!-- 탭 및 안내 -->
            <div class="flex flex-col items-center justify-center mt-1">
                <div class="flex space-x-2">
                    <button id="tab-prob1" class="tab-btn active px-4 py-1.5 rounded-full border border-gray-400 font-semibold text-sm hover:bg-gray-100 text-gray-700">문제 1</button>
                    <button id="tab-prob2" class="tab-btn px-4 py-1.5 rounded-full border border-gray-400 font-semibold text-sm hover:bg-gray-100 text-gray-700">문제 2</button>
                    <button id="tab-prob3" class="tab-btn px-4 py-1.5 rounded-full border border-gray-400 font-semibold text-sm hover:bg-gray-100 text-indigo-600 font-bold">도전 문제</button>
                </div>
                <p class="text-[11px] md:text-sm text-gray-500 mt-2 font-medium">조각을 보드에 채우세요! <span class="text-blue-600">(선택 후 하단 버튼 클릭 또는 '더블클릭' 시 회전)</span></p>
            </div>
        </header>

        <!-- 성공 메시지 -->
        <div id="success-msg" class="absolute top-1/4 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-yellow-900 px-8 py-4 rounded-2xl shadow-2xl z-30 text-xl md:text-2xl font-bold transition-opacity duration-500 opacity-0 pointer-events-none flex flex-col items-center border-4 border-yellow-500 whitespace-nowrap">
            <span>🎉 퍼즐 완성! 🎉</span>
            <span class="text-sm md:text-lg mt-1 font-medium text-yellow-800">정사각형을 완벽하게 채웠습니다!</span>
        </div>

        <!-- 캔버스 영역 -->
        <main class="flex-grow relative w-full h-full flex justify-center items-center overflow-hidden" id="canvasContainer">
            <canvas id="gameCanvas" class="w-full h-full"></canvas>
        </main>

        <!-- 하단 조작 버튼 영역 -->
        <footer class="bg-white p-2 border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-10 flex-shrink-0 w-full">
            <div class="max-w-[300px] mx-auto flex justify-center space-x-3">
                <button id="btn-rotate" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 px-2 rounded-lg shadow-md transition active:scale-95 flex items-center justify-center text-sm">
                    <span class="text-lg mr-1">↻</span> 선택 블록 회전
                </button>
                <button id="btn-reset" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-1.5 px-2 rounded-lg shadow-md transition active:scale-95 flex items-center justify-center text-sm">
                    <span class="text-lg mr-1">↺</span> 다시하기
                </button>
            </div>
        </footer>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');

        // 게임 기본 설정
        const GRID_COLS = 8;
        const GRID_ROWS = 8;
        let CELL = 40; 
        
        // 레이아웃 변수 (도구함 및 보드 위치)
        let toolboxX = 0;
        let boardX = 0;
        let boardY = 0;

        // 색상 팔레트
        const C_BLACK = '#374151'; // 장애물
        const C_YELLOW = '#c6b94c';
        const C_RED = '#b9566d';
        const C_BLUE = '#4e7cb8';
        const C_GREEN = '#8bbca0';
        
        let currentProblem = 1;
        let isWon = false;
        let currentDevice = 'pc';
        
        // 블록 데이터 클래스
        class Block {
            constructor(id, w, h, color, tbGridX, tbGridY) {
                this.id = id;
                this.origW = w; // 처음 가로 길이 저장
                this.origH = h; // 처음 세로 길이 저장
                this.w = w;
                this.h = h;
                this.color = color;
                
                // 왼쪽 대기열(도구함)에서의 격자 위치 (배치를 깔끔하게 하기 위함)
                this.tbGridX = tbGridX; 
                this.tbGridY = tbGridY;
                
                // 현재 픽셀 좌표
                this.x = 0;
                this.y = 0;
                
                this.isDragging = false;
                this.isSelected = false;
                this.isOnBoard = false;
                this.gridX = -1;
                this.gridY = -1;
            }

            rotate() {
                let temp = this.w;
                this.w = this.h;
                this.h = temp;
            }
        }

        let blocks = [];
        let fixedBlocks = [];
        let selectedBlock = null;
        
        let pointer = { x: 0, y: 0, isDown: false };
        let dragOffset = { x: 0, y: 0 };
        let lastTap = 0; 

        // 디바이스 선택 이벤트 처리
        document.querySelectorAll('.device-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.device-btn').forEach(b => {
                    b.classList.remove('bg-blue-500', 'text-white', 'shadow');
                    b.classList.add('text-gray-600', 'hover:bg-gray-200');
                });
                const target = e.currentTarget;
                target.classList.remove('text-gray-600', 'hover:bg-gray-200');
                target.classList.add('bg-blue-500', 'text-white', 'shadow');
                
                currentDevice = target.dataset.device;
                const wrapper = document.getElementById('app-wrapper');
                
                // 기기별 가로 사이즈 제한 적용
                if (currentDevice === 'pc') {
                    wrapper.style.maxWidth = '100%';
                } else if (currentDevice === 'tab') {
                    wrapper.style.maxWidth = '850px';
                } else if (currentDevice === 'mobile') {
                    wrapper.style.maxWidth = '450px'; // 모바일 세로모드 시뮬레이션
                }
                
                setTimeout(() => {
                    resizeCanvas();
                }, 300);
            });
        });

        function createMovableBlocks() {
            // 도구함에 배치하기 위한 격자 좌표 (x, y) - 간격을 좁힘
            blocks = [
                new Block(1, 4, 3, C_YELLOW, 0, 0),     
                new Block(2, 4, 2, C_RED, 4.2, 0),      
                new Block(3, 3, 2, C_RED, 0, 3.2),      
                new Block(8, 2, 2, C_GREEN, 3.2, 3.2),   
                new Block(5, 1, 4, C_BLUE, 5.5, 2.2),      
                new Block(6, 1, 5, C_BLUE, 6.8, 2.2),    
                new Block(4, 5, 2, C_RED, 0, 5.5),         
                new Block(7, 3, 3, C_GREEN, 5.2, 6.5)    
            ];
            resetBlocksToToolbox();
        }

        function loadProblem(num) {
            currentProblem = num;
            isWon = false;
            document.getElementById('success-msg').style.opacity = 0;
            
            // 검은색 블록 위치 정정 적용
            if (num === 1) {
                fixedBlocks = [
                    { x: 4, y: 0, w: 3, h: 1 },
                    { x: 3, y: 2, w: 1, h: 2 },
                    { x: 7, y: 5, w: 1, h: 1 }
                ];
            } else if (num === 2) {
                fixedBlocks = [
                    { x: 0, y: 0, w: 1, h: 3 },
                    { x: 6, y: 3, w: 2, h: 1 },
                    { x: 2, y: 5, w: 1, h: 1 }
                ];
            } else if (num === 3) {
                // 새로운 도전 문제 위치 반영
                fixedBlocks = [
                    { x: 3, y: 0, w: 2, h: 1 },
                    { x: 5, y: 0, w: 1, h: 3 },
                    { x: 4, y: 5, w: 1, h: 1 }
                ];
            }
            createMovableBlocks();
            draw();
        }

        function resetBlocksToToolbox() {
            blocks.forEach(b => {
                b.w = b.origW; // 회전 상태 초기화
                b.h = b.origH; // 회전 상태 초기화
                b.isOnBoard = false;
                b.gridX = -1;
                b.gridY = -1;
                b.x = toolboxX + (b.tbGridX * CELL);
                b.y = boardY + (b.tbGridY * CELL);
            });
            isWon = false;
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;

            // 퍼즐과 조각이 너무 퍼지지 않도록 공간 축소 (16.5칸으로 계산)
            let maxCols = 16.5; 
            let maxRows = 9;
            
            // 해상도 비율 계산
            CELL = Math.min(rect.width / maxCols, rect.height / maxRows);
            
            // 중앙 정렬을 위한 시작점 계산
            let totalPlayWidth = 16.5 * CELL; 
            let startX = (rect.width - totalPlayWidth) / 2;
            if (startX < 0) startX = 0; 
            
            let startY = (rect.height - (GRID_ROWS * CELL)) / 2;

            toolboxX = startX;
            boardX = startX + 8.2 * CELL; // 보드와 툴박스 사이 간격 대폭 축소
            boardY = startY;

            resetBlocksToToolbox();
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        // --- 그리기 로직 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 기존 툴박스 영역의 회색 그림자(흔적)를 완전히 제거하여 깨끗하게 만들었습니다.

            // 1. 8x8 메인 보드 그리기
            ctx.save();
            ctx.translate(boardX, boardY);
            
            // 보드 배경 및 외곽선
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, GRID_COLS * CELL, GRID_ROWS * CELL);
            
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1;
            for(let x=1; x<GRID_COLS; x++) {
                ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, GRID_ROWS*CELL); ctx.stroke();
            }
            for(let y=1; y<GRID_ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(GRID_COLS*CELL, y*CELL); ctx.stroke();
            }

            // 꼭짓점 점 
            ctx.fillStyle = '#64748b';
            const corners = [[0,0], [GRID_COLS,0], [0,GRID_ROWS], [GRID_COLS,GRID_ROWS]];
            corners.forEach(c => {
                ctx.beginPath(); ctx.arc(c[0]*CELL, c[1]*CELL, 5, 0, Math.PI*2); ctx.fill();
            });

            // 보드 테두리
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, GRID_COLS*CELL, GRID_ROWS*CELL);

            // 고정된 검은색 블록 그리기
            ctx.fillStyle = C_BLACK;
            fixedBlocks.forEach(fb => {
                ctx.fillRect(fb.x * CELL, fb.y * CELL, fb.w * CELL, fb.h * CELL);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(fb.x * CELL, fb.y * CELL, fb.w * CELL, fb.h * CELL);
            });
            ctx.restore();

            // 2. 움직이는 블록들 그리기
            const drawOrder = [...blocks].sort((a, b) => {
                if(a.isDragging) return 1;
                if(b.isDragging) return -1;
                if(a.isOnBoard !== b.isOnBoard) return a.isOnBoard ? -1 : 1;
                return 0;
            });

            drawOrder.forEach(b => {
                ctx.save();
                let renderX = b.isOnBoard && !b.isDragging ? boardX + (b.gridX * CELL) : b.x;
                let renderY = b.isOnBoard && !b.isDragging ? boardY + (b.gridY * CELL) : b.y;

                // 드래그 중일 때만 그림자 표시
                if (b.isDragging) {
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetY = 8;
                }

                ctx.fillStyle = b.color;
                ctx.fillRect(renderX, renderY, b.w * CELL, b.h * CELL);

                ctx.strokeStyle = b.isSelected ? '#ef4444' : 'rgba(0,0,0,0.2)';
                ctx.lineWidth = b.isSelected ? 4 : 2;
                ctx.strokeRect(renderX, renderY, b.w * CELL, b.h * CELL);

                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1;
                for(let i=1; i<b.w; i++) {
                    ctx.beginPath(); ctx.moveTo(renderX + i*CELL, renderY); ctx.lineTo(renderX + i*CELL, renderY + b.h*CELL); ctx.stroke();
                }
                for(let i=1; i<b.h; i++) {
                    ctx.beginPath(); ctx.moveTo(renderX, renderY + i*CELL); ctx.lineTo(renderX + b.w*CELL, renderY + i*CELL); ctx.stroke();
                }
                ctx.restore();
            });
        }

        // --- 상호작용 및 논리 ---
        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function checkOverlap(block, testGridX, testGridY) {
            if (testGridX < 0 || testGridY < 0 || testGridX + block.w > GRID_COLS || testGridY + block.h > GRID_ROWS) return true;
            for (let fb of fixedBlocks) {
                if (!(testGridX + block.w <= fb.x || testGridX >= fb.x + fb.w ||
                      testGridY + block.h <= fb.y || testGridY >= fb.y + fb.h)) { return true; }
            }
            for (let ob of blocks) {
                if (ob.id !== block.id && ob.isOnBoard) {
                    if (!(testGridX + block.w <= ob.gridX || testGridX >= ob.gridX + ob.w ||
                          testGridY + block.h <= ob.gridY || testGridY >= ob.gridY + ob.h)) { return true; }
                }
            }
            return false;
        }

        canvas.addEventListener('pointerdown', (e) => {
            if(isWon) return; 
            e.preventDefault();
            pointer.isDown = true;
            let pos = getEventPos(e);
            
            let currentTime = new Date().getTime();
            let isDoubleClick = (currentTime - lastTap) < 300;
            lastTap = currentTime;

            let clickedBlock = null;
            let drawOrder = [...blocks].sort((a, b) => { return a.isOnBoard !== b.isOnBoard ? (a.isOnBoard ? -1 : 1) : 0; });

            for (let i = drawOrder.length - 1; i >= 0; i--) {
                let b = drawOrder[i];
                let bx = b.isOnBoard ? boardX + (b.gridX * CELL) : b.x;
                let by = b.isOnBoard ? boardY + (b.gridY * CELL) : b.y;
                
                if (pos.x >= bx && pos.x <= bx + (b.w * CELL) && pos.y >= by && pos.y <= by + (b.h * CELL)) {
                    clickedBlock = b;
                    break;
                }
            }

            if (selectedBlock) selectedBlock.isSelected = false;

            if (clickedBlock) {
                selectedBlock = clickedBlock;
                selectedBlock.isSelected = true;

                if (isDoubleClick) {
                    rotateSelectedBlock();
                    return; 
                }

                selectedBlock.isDragging = true;
                
                if (selectedBlock.isOnBoard) {
                    selectedBlock.x = boardX + (selectedBlock.gridX * CELL);
                    selectedBlock.y = boardY + (selectedBlock.gridY * CELL);
                    selectedBlock.isOnBoard = false;
                }
                
                dragOffset.x = selectedBlock.x - pos.x;
                dragOffset.y = selectedBlock.y - pos.y;
                
                blocks = blocks.filter(b => b.id !== selectedBlock.id);
                blocks.push(selectedBlock);
            } else {
                selectedBlock = null;
            }
            draw();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (pointer.isDown && selectedBlock && selectedBlock.isDragging) {
                e.preventDefault();
                let pos = getEventPos(e);
                selectedBlock.x = pos.x + dragOffset.x;
                selectedBlock.y = pos.y + dragOffset.y;
                draw();
            }
        });

        function handlePointerUp(e) {
            pointer.isDown = false;
            if (selectedBlock && selectedBlock.isDragging) {
                selectedBlock.isDragging = false;
                
                let centerX = selectedBlock.x + (selectedBlock.w * CELL) / 2;
                let centerY = selectedBlock.y + (selectedBlock.h * CELL) / 2;
                
                if (centerX > boardX && centerX < boardX + (GRID_COLS * CELL) &&
                    centerY > boardY && centerY < boardY + (GRID_ROWS * CELL)) {
                    
                    let gX = Math.round((selectedBlock.x - boardX) / CELL);
                    let gY = Math.round((selectedBlock.y - boardY) / CELL);
                    
                    if (!checkOverlap(selectedBlock, gX, gY)) {
                        selectedBlock.gridX = gX;
                        selectedBlock.gridY = gY;
                        selectedBlock.isOnBoard = true;
                        checkWinCondition();
                    } else {
                        returnToToolbox(selectedBlock);
                    }
                } else {
                     returnToToolbox(selectedBlock);
                }
                draw();
            }
        }
        
        function returnToToolbox(block) {
            block.isOnBoard = false;
            block.x = toolboxX + (block.tbGridX * CELL);
            block.y = boardY + (block.tbGridY * CELL);
        }

        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointerleave', handlePointerUp);

        function rotateSelectedBlock() {
            if (selectedBlock && !isWon) {
                if (selectedBlock.isOnBoard) {
                    let oldW = selectedBlock.w;
                    let oldH = selectedBlock.h;
                    selectedBlock.w = oldH;
                    selectedBlock.h = oldW;
                    
                    if (checkOverlap(selectedBlock, selectedBlock.gridX, selectedBlock.gridY)) {
                        selectedBlock.w = oldW;
                        selectedBlock.h = oldH;
                        returnToToolbox(selectedBlock); 
                    } else {
                        checkWinCondition();
                    }
                } else {
                    selectedBlock.rotate();
                }
                draw();
            }
        }
        document.getElementById('btn-rotate').addEventListener('click', rotateSelectedBlock);

        function checkWinCondition() {
            let filledArea = 0;
            blocks.forEach(b => {
                if (b.isOnBoard) filledArea += (b.w * b.h);
            });
            
            if (filledArea === 58) {
                isWon = true;
                if(selectedBlock) selectedBlock.isSelected = false;
                draw();
                triggerConfetti();
                
                const msg = document.getElementById('success-msg');
                msg.style.opacity = 1;
                setTimeout(() => { msg.style.opacity = 0; }, 5000);
            }
        }

        function triggerConfetti() {
            var duration = 3000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.4, y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.4 + 0.6, y: Math.random() - 0.2 } }));
            }, 250);
        }

        document.getElementById('btn-export').addEventListener('click', () => {
            if(selectedBlock) selectedBlock.isSelected = false;
            draw(); 

            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            let probName = currentProblem === 3 ? 'Challenge' : currentProblem;
            link.download = `Mondrian_Puzzle_${probName}_Solved.png`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function setActiveTab(activeId) {
            ['tab-prob1', 'tab-prob2', 'tab-prob3'].forEach(id => {
                const el = document.getElementById(id);
                if (id === activeId) {
                    el.classList.add('active', 'bg-gray-600', 'text-white');
                    el.classList.remove('text-gray-700', 'text-indigo-600');
                } else {
                    el.classList.remove('active', 'bg-gray-600', 'text-white');
                    if (id === 'tab-prob3') el.classList.add('text-indigo-600');
                    else el.classList.add('text-gray-700');
                }
            });
        }

        document.getElementById('tab-prob1').addEventListener('click', () => {
            setActiveTab('tab-prob1');
            loadProblem(1);
        });
        document.getElementById('tab-prob2').addEventListener('click', () => {
            setActiveTab('tab-prob2');
            loadProblem(2);
        });
        document.getElementById('tab-prob3').addEventListener('click', () => {
            setActiveTab('tab-prob3');
            loadProblem(3);
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            resetBlocksToToolbox();
            draw();
        });

        setTimeout(() => {
            resizeCanvas();
            loadProblem(1);
        }, 100);

    </script>
</body>
</html>
